<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #1f1a14; }
      .box { fill: #fffdf9; stroke: #d9cdb9; stroke-width: 2; rx: 16; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #2d261f; }
      .note { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #5d564d; }
      .arrow { stroke: #1f7668; stroke-width: 4; marker-end: url(#m); fill: none; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f7668"/>
    </marker>
  </defs>

  <rect width="1200" height="500" fill="#f8f3ea"/>
  <text x="45" y="60" class="title">Asset Loading + Bundle Strategy (Merged Best Practice)</text>

  <rect x="50" y="130" width="180" height="84" class="box"/>
  <text x="90" y="178" class="label">Preload</text>
  <text x="78" y="204" class="note">scene / ui</text>

  <rect x="280" y="130" width="190" height="84" class="box"/>
  <text x="328" y="178" class="label">loadBundle</text>
  <text x="324" y="204" class="note">feature pack</text>

  <rect x="520" y="130" width="180" height="84" class="box"/>
  <text x="553" y="178" class="label">load()</text>
  <text x="544" y="204" class="note">asset request</text>

  <rect x="750" y="130" width="190" height="84" class="box"/>
  <text x="790" y="178" class="label">instantiate</text>
  <text x="788" y="204" class="note">prefab / node</text>

  <rect x="990" y="130" width="170" height="84" class="box"/>
  <text x="1022" y="178" class="label">use</text>
  <text x="1016" y="204" class="note">runtime</text>

  <path class="arrow" d="M230 172 L280 172"/>
  <path class="arrow" d="M470 172 L520 172"/>
  <path class="arrow" d="M700 172 L750 172"/>
  <path class="arrow" d="M940 172 L990 172"/>

  <rect x="190" y="300" width="820" height="140" class="box"/>
  <text x="220" y="338" class="label">Release Rules</text>
  <text x="220" y="368" class="note">1) release() short-lived assets when UI closes.</text>
  <text x="220" y="396" class="note">2) Keep shared atlas/audio in long-lived bundle until scene switch.</text>
  <text x="220" y="424" class="note">3) removeBundle() only after all dependent assets are released.</text>
</svg>
